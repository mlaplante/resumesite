<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Thank You - Michael LaPlante</title>
		<meta name="robots" content="noindex">
		<link rel='stylesheet' type='text/css' href='/css/fonts.css'>
		<link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap-reboot.min.css' rel='stylesheet' integrity='sha384-DMXPlKUqiacJPvmloxO8WEKmweTP1X7QWc/yGAFhycsyFqem+stvdOQ4mrtuETGJ' crossorigin='anonymous'>
		<link rel='stylesheet' type='text/css' href='/css/style.css'>
		<link rel="icon" href="/favicon.ico">
		<style>
			.thank-you {
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				text-align: center;
				padding: 40px 20px;
			}
			.thank-you h1 {
				font-size: 2.5rem;
				margin-bottom: 20px;
			}
			.thank-you p {
				font-size: 1.1rem;
				color: #666;
				margin-bottom: 30px;
			}
			body.dark-mode .thank-you p {
				color: #b0b0b0;
			}
		</style>
	</head>
	<body>
		<div class="thank-you">
			<div>
				<h1>Thank you!</h1>
				<p>Your message has been sent. I'll get back to you soon.</p>
				<a href="/" class="btn btn-custom">Back to Home</a>
			</div>
		</div>
		<script defer src='/js/script.js'></script>
	</body>
</html>
