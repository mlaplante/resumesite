# Netlify configuration for static site deployment

[build]
  publish = "."

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.images]
  compress = true

[build.processing.html]
  pretty_urls = true

[[redirects]]
  from = "https://*.netlify.app/*"
  to = "https://michaellaplante.com/:splat"
  status = 301
  force = false

# Security and default cache headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://laplantedevanalytics.netlify.app https://www.googletagmanager.com https://embed.typeform.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' https://res.cloudinary.com data:; font-src 'self'; connect-src 'self' https://laplantedevanalytics.netlify.app https://www.google-analytics.com; frame-src https://michaellaplante.typeform.com; base-uri 'self'; form-action 'self' https://buttondown.com; upgrade-insecure-requests"

# Immutable cache for Astro hashed assets (filenames contain content hash)
[[headers]]
  for = "/blog/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Long cache for static CSS
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

# Long cache for static JS
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

# Long cache for images
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

# Long cache for fonts
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Long cache for favicons
[[headers]]
  for = "/favicon*"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"
