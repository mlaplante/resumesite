# Automated dependency update PRs. Covers both npm package roots and the
# GitHub Actions workflows (Dependabot updates SHA-pinned actions in place,
# keeping the trailing `# vX.Y.Z` comment in sync).
version: 2
updates:
  # Root package: worker tooling, vitest, AI blog-post generator SDK.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      # All bumps (patch/minor/major) land as one PR so every package is
      # kept at its latest version with minimal review noise.
      all-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
          - major

  # Astro site package.
  - package-ecosystem: npm
    directory: /blog-src
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      all-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
          - major

  # Workflow actions (pinned to commit SHAs).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
