# Automated dependency update PRs. Covers both npm package roots and the
# GitHub Actions workflows (Dependabot updates SHA-pinned actions in place,
# keeping the trailing `# vX.Y.Z` comment in sync).
version: 2
updates:
  # Root package: worker tooling, vitest, AI blog-post generator SDK.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    # Wait for freshly published releases to settle before opening a PR, so a
    # bad release that gets yanked or patched within a few days never reaches us.
    cooldown:
      default-days: 7
    groups:
      # Patch/minor bumps land as one PR to cut review noise; majors are
      # grouped into their own PR so breaking changes stay visible.
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      majors:
        patterns:
          - "*"
        update-types:
          - major

  # Astro site package.
  - package-ecosystem: npm
    directory: /blog-src
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      majors:
        patterns:
          - "*"
        update-types:
          - major

  # Workflow actions (pinned to commit SHAs).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
