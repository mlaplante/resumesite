name: Publish Blog Post

on:
  pull_request:
    types: [closed]
    branches: [master]
  # Safety net: also run on direct pushes to master so a draft that lands
  # without the `blog-draft` label (manual PR, direct push, squash from a
  # differently-labeled PR) still gets published.
  push:
    branches: [master]
    paths:
      - 'blog-src/src/content/drafts/**'

# If two blog-draft PRs merge in quick succession, the second job will queue
# behind the first so the `git push` won't race a stale base. The same group
# also serializes the push-triggered runs against PR-merge runs.
concurrency:
  group: publish-blog-post
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name == 'push' || (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'blog-draft'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Move drafts to posts
        id: move
        run: |
          DRAFTS_DIR="blog-src/src/content/drafts"
          POSTS_DIR="blog-src/src/content/posts"
          MOVED=false

          for file in "$DRAFTS_DIR"/*.md; do
            [ -f "$file" ] || continue
            FILENAME=$(basename "$file")
            echo "Moving $FILENAME from drafts/ to posts/"
            mv "$file" "$POSTS_DIR/$FILENAME"
            MOVED=true
          done

          echo "moved=$MOVED" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.move.outputs.moved == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog-src/src/content/drafts/ blog-src/src/content/posts/
          git commit -m "publish: move blog draft(s) to posts for deployment"
          git push

