# Purges the Cloudflare edge cache after a push (best-effort — skipped when
# the Cloudflare secrets aren't configured), then verifies the live site
# (static assets + Worker route) actually responds. The README badge for this
# workflow therefore doubles as a deploy-status badge: green means the site
# is up.
name: Deploy Status

on:
  workflow_dispatch:
  push:
    branches: [master]

# Many pushes in quick succession only need one cache purge — collapse them.
concurrency:
  group: purge-cloudflare-cache
  cancel-in-progress: true

permissions: {}

jobs:
  purge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Purge Cloudflare cache
        run: |
          set -euo pipefail
          # The purge is best-effort: without the Cloudflare secrets we can't
          # call the API, but that shouldn't paint the deploy badge red — the
          # edge cache simply expires on its own TTL instead. (Checking
          # secrets in a job-level `if:` isn't supported, so skip here.)
          if [ -z "${CF_ZONE_ID}" ] || [ -z "${CF_API_TOKEN}" ]; then
            echo "::notice::Cloudflare secrets not configured; skipping cache purge." \
              "Set CLOUDFLARE_ZONE_ID and CLOUDFLARE_API_TOKEN under" \
              "Settings → Secrets and variables → Actions to enable automatic purges."
            exit 0
          fi
          response=$(curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "Cloudflare response: $response"
          # Cloudflare returns { "success": true, ... } on accepted purges.
          # Anything else (network error, auth failure, malformed JSON) should fail the job.
          echo "$response" | grep -q '"success":true' || {
            echo "Cache purge failed." >&2
            exit 1
          }

  verify:
    name: Verify site is deployed
    needs: purge
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # Probe the Worker's workers.dev URL rather than the custom domain:
      # the zone's bot protection challenges automated requests from CI
      # runners with a 403 before they ever reach the Worker, while
      # workers.dev sits outside the zone and hits the Worker directly.
      # If the account subdomain differs, set the DEPLOY_CHECK_HOST
      # repository *variable* (Settings → Secrets and variables → Actions
      # → Variables) — no secrets required.
      DEPLOY_CHECK_HOST: ${{ vars.DEPLOY_CHECK_HOST || 'resumesite.laplantewebdevelopment.workers.dev' }}
    steps:
      - name: Check live site
        run: |
          set -euo pipefail
          check() {
            local desc=$1 url=$2 expected=$3
            local status attempt
            for attempt in 1 2 3; do
              # Identifiable UA so the probe is distinguishable in logs.
              status=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 \
                -A 'resumesite-deploy-check (+https://github.com/mlaplante/resumesite)' \
                "$url" || echo 000)
              if [ "$status" = "$expected" ]; then
                echo "OK: $desc ($url -> $status)"
                return 0
              fi
              echo "Attempt $attempt/3: $desc returned $status, expected $expected" >&2
              [ "$attempt" -lt 3 ] && sleep 10
            done
            echo "FAIL: $desc ($url) never returned $expected" >&2
            return 1
          }
          # Static assets served by the Worker's ASSETS binding.
          check "static site" "https://${DEPLOY_CHECK_HOST}/" 200
          # GET /api/contact returns 405 from the Worker router itself, so this
          # proves the Worker is deployed and routing — a missing Worker would
          # return 404/5xx instead.
          check "worker API route" "https://${DEPLOY_CHECK_HOST}/api/contact" 405
