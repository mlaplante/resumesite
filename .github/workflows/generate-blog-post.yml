name: Generate Daily Blog Post

on:
  schedule:
    # Every day at 8:00 AM UTC (adjust to your timezone)
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Generation mode'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - topic
          - git
      topic:
        description: 'Topic (required when mode is "topic")'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

# Avoid two scheduled runs and a manual dispatch racing each other into
# duplicate PRs against `master`.
concurrency:
  group: blog-post-generator
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Actions are pinned to full commit SHAs so a moved/compromised tag
      # can't inject code into a workflow that holds `contents: write`.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0  # full history for git-log mode

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Generate blog post draft
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: 'gemini-2.5-flash'
          INPUT_MODE: ${{ github.event.inputs.mode || 'auto' }}
          INPUT_TOPIC: ${{ github.event.inputs.topic || '' }}
        run: |
          case "$INPUT_MODE" in
            auto|topic|git) ;;
            *) echo "Invalid mode: $INPUT_MODE" >&2; exit 1 ;;
          esac

          if [ "$INPUT_MODE" = "topic" ] && [ -n "$INPUT_TOPIC" ]; then
            node scripts/generate-post-gemini.js topic "$INPUT_TOPIC"
          else
            node scripts/generate-post-gemini.js "$INPUT_MODE"
          fi

      - name: Check for new draft
        id: check
        run: |
          if git status --porcelain | grep -q 'blog-src/src/content/drafts/'; then
            DRAFT_FILE=$(git status --porcelain | grep 'blog-src/src/content/drafts/' | awk '{print $2}' | head -1)
            # Title is AI-generated; never interpolate it directly into a shell command.
            # Sanitize aggressively (printable ASCII minus shell metacharacters) and cap length.
            RAW_TITLE=$(head -5 "$DRAFT_FILE" | grep '^title:' | sed 's/^title: *"//;s/"$//')
            SAFE_TITLE=$(printf '%s' "$RAW_TITLE" | tr -cd 'A-Za-z0-9 _.,:!?-' | head -c 120)
            {
              echo "has_draft=true"
              echo "draft_file=$DRAFT_FILE"
              echo "title=$SAFE_TITLE"
            } >> "$GITHUB_OUTPUT"
          else
            echo "has_draft=false" >> "$GITHUB_OUTPUT"
            echo "No new draft was generated."
          fi

      - name: Create PR with draft
        if: steps.check.outputs.has_draft == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRAFT_TITLE: ${{ steps.check.outputs.title }}
          DRAFT_FILE: ${{ steps.check.outputs.draft_file }}
        run: |
          DATE=$(date +%Y-%m-%d)
          SLUG=$(printf '%s' "$DRAFT_TITLE" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9' '-' | head -c 40)
          BRANCH="blog/draft-${DATE}-${SLUG}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add blog-src/src/content/drafts/
          git commit -m "draft: $DRAFT_TITLE"
          git push -u origin "$BRANCH"

          gh label create blog-draft --color "0E8A16" --description "Auto-generated blog draft" 2>/dev/null || true

          PR_BODY=$(cat <<EOF
          ## Auto-Generated Blog Draft

          **File:** \`${DRAFT_FILE}\`

          This post was automatically generated by the daily blog pipeline using Google Gemini.

          ### To publish:
          1. Review and edit the draft in \`${DRAFT_FILE}\`
          2. Add appropriate tags in the frontmatter
          3. Merge this PR

          > **Note:** When this PR is merged, the draft will automatically be moved
          > from \`drafts/\` to \`posts/\` and deployed to the site.

          *Generated via GitHub Actions*
          EOF
          )

          gh pr create \
            --title "📝 Blog Draft: $DRAFT_TITLE" \
            --body "$PR_BODY" \
            --label "blog-draft" \
            --base master
