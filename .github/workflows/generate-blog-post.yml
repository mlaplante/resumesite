name: Generate Daily Blog Post

on:
  schedule:
    # Every day at 8:00 AM UTC (adjust to your timezone)
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Generation mode'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - topic
          - git
      topic:
        description: 'Topic (required when mode is "topic")'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git-log mode

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate blog post draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_MODEL: 'openai/gpt-4.1'
        run: |
          MODE="${{ github.event.inputs.mode || 'auto' }}"
          TOPIC="${{ github.event.inputs.topic || '' }}"

          if [ "$MODE" = "topic" ] && [ -n "$TOPIC" ]; then
            node scripts/generate-post-gh-models.js topic "$TOPIC"
          else
            node scripts/generate-post-gh-models.js "$MODE"
          fi

      - name: Check for new draft
        id: check
        run: |
          if git diff --name-only | grep -q '^blog-src/src/content/drafts/'; then
            DRAFT_FILE=$(git diff --name-only | grep '^blog-src/src/content/drafts/' | head -1)
            TITLE=$(head -5 "$DRAFT_FILE" | grep '^title:' | sed 's/^title: *"//;s/"$//')
            echo "has_draft=true" >> "$GITHUB_OUTPUT"
            echo "draft_file=$DRAFT_FILE" >> "$GITHUB_OUTPUT"
            echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          else
            echo "has_draft=false" >> "$GITHUB_OUTPUT"
            echo "No new draft was generated."
          fi

      - name: Create PR with draft
        if: steps.check.outputs.has_draft == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="blog/draft-${DATE}-$(echo '${{ steps.check.outputs.title }}' | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9' '-' | head -c 40)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add blog-src/src/content/drafts/
          git commit -m "draft: ${{ steps.check.outputs.title }}"
          git push -u origin "$BRANCH"

          gh pr create \
            --title "📝 Blog Draft: ${{ steps.check.outputs.title }}" \
            --body "$(cat <<'EOF'
          ## Auto-Generated Blog Draft

          **File:** `${{ steps.check.outputs.draft_file }}`

          This post was automatically generated by the daily blog pipeline using GitHub Models.

          ### To publish:
          1. Review and edit the draft in `${{ steps.check.outputs.draft_file }}`
          2. Move the file from `drafts/` to `posts/`
          3. Add appropriate tags in the frontmatter
          4. Merge this PR

          *Generated on ${{ steps.check.outputs.title }} via GitHub Actions*
          EOF
          )" \
            --label "blog-draft" \
            --base master
